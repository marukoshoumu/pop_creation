<script>
var state = { popType: 'product', inputText: '', audio: null, fields: null, missing: [], catches: [], selectedIndex: 0, content: null, editingBase: null };

function runServer(fnName) {
  var args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function (resolve, reject) {
    var runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(function (e) { reject(new Error(e && e.message ? e.message : '通信に失敗しました')); });
    runner[fnName].apply(runner, args);
  });
}

function showScreen(name) {
  document.querySelectorAll('main > section[data-screen]').forEach(function (s) {
    s.hidden = s.getAttribute('data-screen') !== name;
  });
  window.scrollTo(0, 0);
}

function showLoading(msg) {
  document.getElementById('loading-msg').textContent = msg || '処理中…';
  document.getElementById('loading').hidden = false;
}
function hideLoading() { document.getElementById('loading').hidden = true; }

var retryFn_ = null;
function showError(msg, retryFn) {
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-retry').hidden = !retryFn;
  retryFn_ = retryFn || null;
  document.getElementById('error-bar').hidden = false;
}
document.getElementById('error-retry').addEventListener('click', function () {
  document.getElementById('error-bar').hidden = true;
  if (retryFn_) retryFn_();
});
document.getElementById('error-close').addEventListener('click', function () {
  document.getElementById('error-bar').hidden = true;
});

/* ===== 画面1: ホーム ===== */
function loadHome() {
  showScreen('home');
  var grid = document.getElementById('history-grid');
  runServer('api_listPops').then(function (list) {
    if (!list.length) { grid.innerHTML = '<p class="muted">まだPOPがありません。「新しいPOPをつくる」から始めましょう。</p>'; return; }
    grid.innerHTML = list.map(function (p, i) {
      var img = p.サムネ
        ? '<img src="' + p.サムネ + '" alt="" style="width:100%;border-radius:4px">'
        : '<div class="muted" style="padding:20px;text-align:center">' + escapeHtml(p.商品名) + '</div>';
      return '<div class="history-card">' + img +
        '<div class="meta"><b>' + escapeHtml(p.商品名) + '</b><br>' + escapeHtml(p.種別) + '・' + escapeHtml(p.サイズ) + ' ／ ' + escapeHtml(p.作成日時) + '</div>' +
        '<button class="btn mini" data-reprint="' + i + '">🖨 再印刷</button> ' +
        '<button class="btn mini ghost" data-edit="' + i + '">編集</button></div>';
    }).join('');
    grid.querySelectorAll('[data-reprint]').forEach(function (b) {
      b.addEventListener('click', function () { reprintPop(list[Number(b.getAttribute('data-reprint'))]); });
    });
    grid.querySelectorAll('[data-edit]').forEach(function (b) {
      b.addEventListener('click', function () { editPop(list[Number(b.getAttribute('data-edit'))]); });
    });
  }).catch(function (e) { grid.innerHTML = '<p class="muted">履歴を読み込めませんでした: ' + escapeHtml(e.message) + '</p>'; });
}

/* reprintPop / editPop は Task 13 で実装。それまでは仮置き */
function reprintPop(p) { console.log('reprint', p.ID); }
function editPop(p) { console.log('edit', p.ID); }

document.getElementById('btn-new').addEventListener('click', function () {
  state = { popType: 'product', inputText: '', audio: null, fields: null, missing: [], catches: [], selectedIndex: 0, content: null, editingBase: null };
  saved_ = false;
  document.getElementById('input-text').value = '';
  document.getElementById('audio-name').textContent = '';
  showScreen('input');
});

/* ===== 画面2: 入力 ===== */
var AUDIO_MAX_BYTES = 15 * 1024 * 1024;
var AUDIO_TYPES = { m4a: 'audio/mp4', mp3: 'audio/mpeg', wav: 'audio/wav', aac: 'audio/aac', ogg: 'audio/ogg', flac: 'audio/flac' };

function setPopType(t) {
  state.popType = t;
  document.getElementById('choice-product').classList.toggle('on', t === 'product');
  document.getElementById('choice-explain').classList.toggle('on', t === 'explain');
}
document.getElementById('choice-product').addEventListener('click', function () { setPopType('product'); });
document.getElementById('choice-explain').addEventListener('click', function () { setPopType('explain'); });
document.getElementById('input-back').addEventListener('click', loadHome);

document.getElementById('audio-drop').addEventListener('click', function () {
  document.getElementById('audio-file').click();
});
document.getElementById('audio-file').addEventListener('change', function () {
  var f = this.files[0];
  if (!f) return;
  var ext = f.name.split('.').pop().toLowerCase();
  if (!AUDIO_TYPES[ext]) {
    showError('対応していないファイル形式です(m4a / mp3 / wav / aac / ogg / flac)。テキスト入力もご利用いただけます。');
    this.value = ''; return;
  }
  var mime = AUDIO_TYPES[ext];
  if (f.size > AUDIO_MAX_BYTES) {
    showError('ファイルが大きすぎます(15MBまで)。短く録り直すか、テキスト入力をご利用ください。');
    this.value = ''; return;
  }
  var reader = new FileReader();
  reader.onload = function () {
    state.audio = { mimeType: mime, base64: String(reader.result).split(',')[1] };
    document.getElementById('audio-name').textContent = '✓ ' + f.name;
  };
  reader.readAsDataURL(f);
});

function processInput() {
  state.inputText = document.getElementById('input-text').value.trim();
  if (!state.audio && !state.inputText) {
    showError('音声ファイルかテキストのどちらかを入れてください。'); return;
  }
  showLoading('AIがインタビューを整理しています…(音声は1〜2分かかることがあります)');
  runServer('api_processInput', { popType: state.popType, text: state.inputText || null, audio: state.audio })
    .then(function (r) {
      hideLoading();
      state.fields = r.fields; state.missing = r.missing;
      renderConfirm();          // Task 10
      showScreen('confirm');
    })
    .catch(function (e) {
      hideLoading();
      showError(e.message, processInput);  // spec: 入力は画面に保持したままリトライ可能
    });
}
document.getElementById('btn-process').addEventListener('click', processInput);

/* ===== 画面3: 確認・編集 ===== */
function fieldRow_(key, label, value, opts) {
  opts = opts || {};
  var warn = opts.warn ? ' warn' : '';
  var input = opts.textarea
    ? '<textarea class="input area" data-field="' + key + '">' + escapeHtml(value) + '</textarea>'
    : '<input class="input" data-field="' + key + '" value="' + escapeHtml(value) + '">';
  return '<div class="field' + warn + '"><label>' + label + '</label>' + input +
    (opts.hint ? '<div class="hint">' + opts.hint + '</div>' : '') + '</div>';
}

function renderConfirm() {
  var f = state.fields;
  var html;
  if (state.popType === 'product') {
    html = fieldRow_('商品名', '商品名', f.商品名) +
      fieldRow_('補足', '補足（よみ・別名）', f.補足) +
      fieldRow_('価格', '価格（税込・数字のみ）', f.価格 === null ? '' : f.価格,
        { warn: true, hint: '※ ここで入力した数字が“そのまま”印刷されます。かならず確認してください。' }) +
      fieldRow_('容量', '容量（例: 10g、3本）', f.容量) +
      fieldRow_('生産者', '生産者・売り場名', f.生産者) +
      fieldRow_('アピールポイント', 'アピールポイント（1行1つ）', f.アピールポイント.join('\n'), { textarea: true });
  } else {
    html = fieldRow_('フック', 'フック（興味を引く一言）', f.フック) +
      fieldRow_('主題', '主題', f.主題) +
      fieldRow_('説明文', '説明文', f.説明文, { textarea: true }) +
      fieldRow_('箇条書き', '箇条書き（1行1つ）', f.箇条書き.join('\n'), { textarea: true }) +
      fieldRow_('比較データ', '比較データ（例: ビタミンE,4,1,倍,他社比 を1行1つ）',
        f.比較データ.map(function (d) { return [d.ラベル, d.対象値, d.比較値, d.単位, d.補足 || ''].join(','); }).join('\n'),
        { textarea: true, hint: 'ラベル,対象値,比較値,単位,補足 の順。グラフはこの数値どおりに描かれます。' });
  }
  document.getElementById('confirm-form').innerHTML = html;
  document.getElementById('missing-note').textContent =
    state.missing.length ? '（聞き取れなかった項目: ' + state.missing.join('・') + '）' : '';
}

function collectConfirm_() {
  var get = function (k) {
    var el = document.querySelector('[data-field="' + k + '"]');
    return el ? el.value.trim() : '';
  };
  var lines = function (k) { return get(k).split('\n').map(function (s) { return s.trim(); }).filter(Boolean); };
  if (state.popType === 'product') {
    var priceRaw = get('価格');
    if (!get('商品名')) { showError('商品名は必須です。'); return null; }
    if (priceRaw === '' || isNaN(Number(priceRaw))) { showError('価格は数字で入力してください（必須）。'); return null; }
    if (Number(priceRaw) < 0) { showError('価格は0以上の数字で入力してください。'); return null; }
    return {
      商品名: get('商品名'), 補足: get('補足'), 価格: Number(priceRaw),
      容量: get('容量'), 生産者: get('生産者'), アピールポイント: lines('アピールポイント'),
    };
  }
  if (!get('主題')) { showError('主題は必須です。'); return null; }
  return {
    フック: get('フック'), 主題: get('主題'), 説明文: get('説明文'), 箇条書き: lines('箇条書き'),
    比較データ: lines('比較データ').map(function (l) {
      var p = l.split(',');
      return { ラベル: p[0] || '', 対象値: Number(p[1]), 比較値: Number(p[2] || 1), 単位: p[3] || '倍', 補足: (p[4] || '').trim() };
    }).filter(function (d) { return d.ラベル && isFinite(d.対象値) && d.対象値 >= 0 && isFinite(d.比較値) && d.比較値 > 0; }),
  };
}

function requestCatches() {
  var fields = collectConfirm_();
  if (!fields) return;
  state.fields = fields;
  showLoading('キャッチコピーを考えています…');
  runServer('api_generateCatches', { popType: state.popType, fields: fields })
    .then(function (catches) {
      hideLoading();
      state.catches = catches;
      renderVariants();         // Task 11
      showScreen('variants');
    })
    .catch(function (e) {
      hideLoading();
      // spec: 失敗時は手入力 1 案に退避できる
      showError(e.message + '（「もう一度」か、手入力でキャッチを1つ書いて進むこともできます）', requestCatches);
      var manual = prompt('キャッチコピーを手入力しますか？（キャンセルで中止）');
      if (manual) {
        state.catches = [{ 切り口: '手入力', キャッチ: manual }];
        renderVariants();
        showScreen('variants');
      }
    });
}
document.getElementById('btn-catches').addEventListener('click', requestCatches);
document.getElementById('confirm-back').addEventListener('click', function () { showScreen('input'); });

/* ===== 画面4: 3案選択 ===== */
var PRODUCT_VARIANTS = ['v1', 'v2', 'v3'];
var EXPLAIN_VARIANTS = ['e1', 'e2', 'e3'];

function contentFor_(i) {
  var variants = state.popType === 'product' ? PRODUCT_VARIANTS : EXPLAIN_VARIANTS;
  var c = state.catches[i] || state.catches[0];
  return {
    type: state.popType,
    variant: variants[i % variants.length],
    catch: c.キャッチ, catchAngle: c.切り口,
    fields: state.fields,
  };
}

function renderVariants() {
  var picks = document.getElementById('variant-picks');
  var n = Math.min(3, state.catches.length || 1);
  var html = '';
  for (var i = 0; i < n; i++) {
    var content = contentFor_(i);
    html += '<div class="pick' + (i === 0 ? ' on' : '') + '" data-pick="' + i + '">' +
      '<div class="pick-preview">' + renderPop(content) + '</div>' +
      '<div class="radio">' + (i === 0 ? '●' : '○') + ' 案' + (i + 1) + ' ' + escapeHtml(content.catchAngle) + '</div></div>';
  }
  picks.innerHTML = html;
  state.selectedIndex = 0;
  document.getElementById('catch-edit').value = state.catches[0].キャッチ;
  picks.querySelectorAll('[data-pick]').forEach(function (el) {
    el.addEventListener('click', function () {
      state.selectedIndex = Number(el.getAttribute('data-pick'));
      picks.querySelectorAll('.pick').forEach(function (p, j) {
        p.classList.toggle('on', j === state.selectedIndex);
        p.querySelector('.radio').textContent = (j === state.selectedIndex ? '● ' : '○ ') +
          '案' + (j + 1) + ' ' + state.catches[j].切り口;
      });
      document.getElementById('catch-edit').value = state.catches[state.selectedIndex].キャッチ;
    });
  });
}

document.getElementById('btn-select').addEventListener('click', function () {
  var edited = document.getElementById('catch-edit').value.trim();
  if (edited) state.catches[state.selectedIndex].キャッチ = edited;
  state.content = contentFor_(state.selectedIndex);
  renderPrint();               // Task 12
  showScreen('print');
});
document.getElementById('variants-back').addEventListener('click', function () {
  renderConfirm();
  showScreen('confirm');
});

/* ===== 画面5: 印刷・保存 ===== */
function renderPrint() {
  document.getElementById('print-preview').innerHTML = renderPop(state.content);
}

function popRecord_() {
  var f = state.content.fields;
  return {
    種別: state.content.type === 'product' ? '商品型' : '説明型',
    サイズ: state.content.type === 'product' ? '棚札' : 'A4縦',
    商品名: state.content.type === 'product' ? f.商品名 : f.主題,
    内容JSON: JSON.stringify(state.content),
  };
}

function capturePng_() {
  var area = document.getElementById('print-area');
  area.innerHTML = renderPop(state.content);
  return html2canvas(area.firstElementChild, { scale: 1.5 })
    .then(function (canvas) {
      area.innerHTML = '';
      return canvas.toDataURL('image/png').split(',')[1];
    })
    .catch(function (e) {
      area.innerHTML = '';
      console.warn('html2canvas 失敗:', e);
      return null;  // spec: 印刷・保存は PNG 無しで続行
    });
}

var saved_ = false;
var saving_ = false;
function savePopWithPng_() {
  if (saved_ || saving_) return Promise.resolve();
  saving_ = true;
  var status = document.getElementById('save-status');
  status.textContent = '履歴に保存しています…';
  return capturePng_().then(function (png) {
    return runServer('api_savePop', popRecord_(), png).then(function (r) {
      saved_ = true;
      saving_ = false;
      status.textContent = '✓ 履歴に保存しました（' + r.id + '）' +
        (r.thumbnailSaved ? '' : ' ※サムネイル画像は保存できませんでした（再印刷は可能です）');
    });
  }).catch(function (e) {
    saving_ = false;
    status.innerHTML = '保存に失敗しました: ' + escapeHtml(e.message) +
      ' <button class="btn mini" id="save-retry">保存を再試行</button>';
    document.getElementById('save-retry').addEventListener('click', savePopWithPng_);
  });
}

document.getElementById('btn-print').addEventListener('click', function () {
  if (saving_) return;
  var area = document.getElementById('print-area');
  area.innerHTML = renderPop(state.content);
  window.print();
  area.innerHTML = '';
  savePopWithPng_();   // 印刷ダイアログ後に保存（spec: 保存失敗でも印刷は成立）
});
document.getElementById('print-back').addEventListener('click', function () { saved_ = false; showScreen('variants'); });

loadHome();
</script>
