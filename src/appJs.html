<script>
function initialState_() {
  return { popType: 'product', fontTheme: 'fude', decoTheme: 'plain', fontScale: 1,
    accent: '', stampPos: 'tr', badge: true, producerFileId: '',
    frame: '', sdeco: '', psize: 'm', ppos: 'l',
    inputText: '', audio: null, fields: null, missing: [], catches: [], selectedIndex: 0, content: null, fromReprint: false };
}
var state = initialState_();

function runServer(fnName) {
  var args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function (resolve, reject) {
    var runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(function (e) { reject(new Error(e && e.message ? e.message : '通信に失敗しました')); });
    runner[fnName].apply(runner, args);
  });
}

function showScreen(name) {
  document.querySelectorAll('main > section[data-screen]').forEach(function (s) {
    s.hidden = s.getAttribute('data-screen') !== name;
  });
  window.scrollTo(0, 0);
}

function showLoading(msg) {
  document.getElementById('loading-msg').textContent = msg || '処理中…';
  document.getElementById('loading').hidden = false;
}
function hideLoading() { document.getElementById('loading').hidden = true; }

var retryFn_ = null;
function showError(msg, retryFn) {
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-retry').hidden = !retryFn;
  retryFn_ = retryFn || null;
  document.getElementById('error-bar').hidden = false;
}
document.getElementById('error-retry').addEventListener('click', function () {
  document.getElementById('error-bar').hidden = true;
  if (retryFn_) retryFn_();
});
document.getElementById('error-close').addEventListener('click', function () {
  document.getElementById('error-bar').hidden = true;
});

/* ===== 生産者マスタ（顔イラスト） ===== */
var producers_ = null;    // マスタ一覧のキャッシュ（登録時に無効化）
var portraitCache_ = {};  // イラストFileID -> データURI

function fetchPortrait_(fileId) {
  if (!fileId) return Promise.resolve(null);
  if (portraitCache_[fileId]) return Promise.resolve(portraitCache_[fileId]);
  return runServer('api_getPortrait', fileId).then(function (r) {
    portraitCache_[fileId] = 'data:' + r.mimeType + ';base64,' + r.base64;
    return portraitCache_[fileId];
  }).catch(function () { return null; });  // 取得失敗はイラスト無しで続行
}

/** 内容JSONには fileId のみ保存。描画直前にキャッシュ済みイラストを fields に注入する */
function withPortrait_(content) {
  var id = content && content.producerFileId;
  if (!id || !portraitCache_[id]) return content;
  var c = Object.assign({}, content);
  c.fields = Object.assign({}, content.fields, { 生産者イラスト: portraitCache_[id] });
  return c;
}

/* ===== 画面1: ホーム ===== */
function loadHome() {
  showScreen('home');
  var grid = document.getElementById('history-grid');
  runServer('api_listPops').then(function (list) {
    if (!list.length) { grid.innerHTML = '<p class="muted">まだPOPがありません。「新しいPOPをつくる」から始めましょう。</p>'; return; }
    var draw = function () {
      grid.innerHTML = list.map(function (p, i) {
        // サムネは画像化せず、保存済み内容JSONから実物ミニプレビューを描く（常に鮮明・正確）
        var preview = '<div class="muted" style="padding:20px;text-align:center">' + escapeHtml(p.商品名) + '</div>';
        try {
          var c = JSON.parse(p.内容JSON);
          if (c && (c.type === 'product' || c.type === 'explain') && c.fields) {
            preview = '<div class="pick-preview">' + renderPop(withPortrait_(c)) + '</div>';
          }
        } catch (e) { /* 壊れた行はテキスト表示にフォールバック */ }
        return '<div class="history-card">' + preview +
          '<div class="meta"><b>' + escapeHtml(p.商品名) + '</b><br>' + escapeHtml(p.種別) + '・' + escapeHtml(p.サイズ) + ' ／ ' + escapeHtml(p.作成日時) + '</div>' +
          '<button class="btn mini" data-reprint="' + i + '">🖨 再印刷</button> ' +
          '<button class="btn mini ghost" data-edit="' + i + '">編集</button></div>';
      }).join('');
      grid.querySelectorAll('[data-reprint]').forEach(function (b) {
        b.addEventListener('click', function () { reprintPop(list[Number(b.getAttribute('data-reprint'))]); });
      });
      grid.querySelectorAll('[data-edit]').forEach(function (b) {
        b.addEventListener('click', function () { editPop(list[Number(b.getAttribute('data-edit'))]); });
      });
    };
    draw();
    // 未取得の似顔絵があれば取得し、一度だけ描き直す
    var need = {};
    list.forEach(function (p) {
      try {
        var c = JSON.parse(p.内容JSON);
        if (c && c.producerFileId && !portraitCache_[c.producerFileId]) need[c.producerFileId] = 1;
      } catch (e) { /* 壊れた行は無視 */ }
    });
    var missing = Object.keys(need);
    if (missing.length) {
      Promise.all(missing.map(fetchPortrait_)).then(function (r) {
        if (r.some(Boolean)) draw();
      });
    }
  }).catch(function (e) { grid.innerHTML = '<p class="muted">履歴を読み込めませんでした: ' + escapeHtml(e.message) + '</p>'; });
}

/* ===== 履歴: 再印刷・編集 ===== */
function restoreContent_(p) {
  var content;
  try { content = JSON.parse(p.内容JSON); }
  catch (e) { showError('このPOPのデータを読み込めませんでした。'); return null; }
  // 空/壊れた履歴行（例: スモークテスト行の {}）を弾く
  if (!content || (content.type !== 'product' && content.type !== 'explain') || !content.fields) {
    showError('このPOPは再表示できません（テスト用データか、古い形式の可能性があります）。');
    return null;
  }
  return content;
}

function reprintPop(p) {
  var content = restoreContent_(p);
  if (!content) return;
  state.content = content;
  state.popType = content.type;
  state.fromReprint = true;   // 再印刷モード: 「もどる」はホームへ
  saved_ = true;              // 再印刷では履歴を二重登録しない
  saving_ = false;            // 前回保存中フラグの残留を防ぐ
  renderPrint();
  document.getElementById('save-status').textContent = '再印刷モード（履歴には保存済みです）';
  showScreen('print');
}

function editPop(p) {
  var content = restoreContent_(p);
  if (!content) return;
  state.popType = content.type;
  state.fontTheme = content.fontTheme || 'fude';
  state.decoTheme = content.decoTheme || 'plain';
  state.fontScale = content.fontScale || 1;
  state.accent = content.accent || '';
  var adj = content.adjust || {};
  state.stampPos = adj.stamp === 'tl' || adj.stamp === 'off' ? adj.stamp : 'tr';
  state.badge = adj.badge !== false;
  state.frame = adj.frame || '';
  state.sdeco = adj.sdeco || '';
  state.psize = adj.psize === 's' || adj.psize === 'l' ? adj.psize : 'm';
  state.ppos = adj.ppos === 'r' ? 'r' : 'l';
  state.producerFileId = content.producerFileId || '';
  state.fields = content.fields;
  state.missing = [];
  state.fromReprint = false;  // 編集は通常フローに合流する
  saved_ = false;             // 編集後の印刷は新規行として保存
  saving_ = false;            // 前回保存中フラグの残留を防ぐ
  renderConfirm();
  showScreen('confirm');
}

document.getElementById('btn-new').addEventListener('click', function () {
  state = initialState_();
  saved_ = false;
  document.getElementById('input-text').value = '';
  document.getElementById('audio-name').textContent = '';
  setPopType('product');
  showScreen('input');
});

/* ===== 画面2: 入力 ===== */
var AUDIO_MAX_BYTES = 15 * 1024 * 1024;
var AUDIO_TYPES = { m4a: 'audio/mp4', mp3: 'audio/mpeg', wav: 'audio/wav', aac: 'audio/aac', ogg: 'audio/ogg', flac: 'audio/flac' };

function setPopType(t) {
  state.popType = t;
  document.getElementById('choice-product').classList.toggle('on', t === 'product');
  document.getElementById('choice-explain').classList.toggle('on', t === 'explain');
}
document.getElementById('choice-product').addEventListener('click', function () { setPopType('product'); });
document.getElementById('choice-explain').addEventListener('click', function () { setPopType('explain'); });
document.getElementById('input-back').addEventListener('click', loadHome);

document.getElementById('audio-drop').addEventListener('click', function () {
  document.getElementById('audio-file').click();
});
document.getElementById('audio-file').addEventListener('change', function () {
  var f = this.files[0];
  if (!f) return;
  var ext = f.name.split('.').pop().toLowerCase();
  if (!AUDIO_TYPES[ext]) {
    showError('対応していないファイル形式です(m4a / mp3 / wav / aac / ogg / flac)。テキスト入力もご利用いただけます。');
    this.value = ''; return;
  }
  var mime = AUDIO_TYPES[ext];
  if (f.size > AUDIO_MAX_BYTES) {
    showError('ファイルが大きすぎます(15MBまで)。短く録り直すか、テキスト入力をご利用ください。');
    this.value = ''; return;
  }
  var reader = new FileReader();
  reader.onload = function () {
    state.audio = { mimeType: mime, base64: String(reader.result).split(',')[1] };
    document.getElementById('audio-name').textContent = '✓ ' + f.name;
  };
  reader.readAsDataURL(f);
});

function processInput() {
  state.inputText = document.getElementById('input-text').value.trim();
  if (!state.audio && !state.inputText) {
    showError('音声ファイルかテキストのどちらかを入れてください。'); return;
  }
  showLoading('AIがインタビューを整理しています…(音声は1〜2分かかることがあります)');
  runServer('api_processInput', { popType: state.popType, text: state.inputText || null, audio: state.audio })
    .then(function (r) {
      hideLoading();
      state.fields = r.fields; state.missing = r.missing;
      renderConfirm();          // Task 10
      showScreen('confirm');
    })
    .catch(function (e) {
      hideLoading();
      // spec: AIが全滅しても手入力→テンプレート→印刷の経路は常に生きている
      showError(e.message + ' うまくいかない場合は「AIを使わず手入力する」もご利用いただけます。', processInput);
    });
}
document.getElementById('btn-process').addEventListener('click', processInput);

/** AIを使わず、空フォームから手入力で確認画面へ進む（spec: AI全滅時の迂回路） */
function startManualEntry() {
  state.inputText = document.getElementById('input-text').value.trim();
  state.fields = state.popType === 'product'
    ? { 商品名: '', 補足: '', 価格: null, 容量: '', 生産者: '', 生産者のひとこと: '', アピールポイント: [] }
    : { フック: '', 主題: '', 生産者: '', 生産者のひとこと: '', 説明文: '', 箇条書き: [], 比較データ: [] };
  state.missing = [];
  renderConfirm();
  showScreen('confirm');
}
document.getElementById('btn-manual').addEventListener('click', startManualEntry);

/* ===== 画面3: 確認・編集 ===== */
function fieldRow_(key, label, value, opts) {
  opts = opts || {};
  var warn = opts.warn ? ' warn' : '';
  var input = opts.textarea
    ? '<textarea class="input area" data-field="' + key + '">' + escapeHtml(value) + '</textarea>'
    : '<input class="input" data-field="' + key + '" value="' + escapeHtml(value) + '">';
  return '<div class="field' + warn + '"><label>' + label + '</label>' + input +
    (opts.hint ? '<div class="hint">' + opts.hint + '</div>' : '') + '</div>';
}

function renderConfirm() {
  var f = state.fields;
  var html;
  if (state.popType === 'product') {
    html = fieldRow_('商品名', '商品名', f.商品名) +
      fieldRow_('補足', '補足（よみ・別名）', f.補足) +
      fieldRow_('価格', '価格（税込・数字のみ）', f.価格 === null ? '' : f.価格,
        { warn: true, hint: '※ ここで入力した数字が“そのまま”印刷されます。かならず確認してください。' }) +
      fieldRow_('容量', '容量（例: 10g、3本）', f.容量) +
      fieldRow_('生産者', '生産者・売り場名', f.生産者) +
      fieldRow_('生産者のひとこと', '生産者のひとこと（本人の言葉のまま。「」内に印刷）', f.生産者のひとこと || '',
        { hint: '例: 今年は雪が多くて、そのぶん甘くなったよ。空欄なら印刷されません。' }) +
      fieldRow_('アピールポイント', 'アピールポイント（1行1つ）', f.アピールポイント.join('\n'), { textarea: true });
  } else {
    html = fieldRow_('フック', 'フック（興味を引く一言）', f.フック) +
      fieldRow_('主題', '主題', f.主題) +
      fieldRow_('生産者', '生産者（人名。例: 佐藤さん）', f.生産者 || '') +
      fieldRow_('生産者のひとこと', '生産者のひとこと（本人の言葉のまま。吹き出しで印刷）', f.生産者のひとこと || '',
        { hint: '空欄なら吹き出しは印刷されません。' }) +
      fieldRow_('説明文', '説明文', f.説明文, { textarea: true }) +
      fieldRow_('箇条書き', '箇条書き（1行1つ）', f.箇条書き.join('\n'), { textarea: true }) +
      fieldRow_('比較データ', '比較データ（例: ビタミンE,4,1,倍,他社比 を1行1つ）',
        f.比較データ.map(function (d) { return [d.ラベル, d.対象値, d.比較値, d.単位, d.補足 || ''].join(','); }).join('\n'),
        { textarea: true, hint: 'ラベル,対象値,比較値,単位,補足 の順。グラフはこの数値どおりに描かれます。' });
  }
  document.getElementById('confirm-form').innerHTML = html;
  document.getElementById('missing-note').textContent =
    state.missing.length ? '（聞き取れなかった項目: ' + state.missing.join('・') + '）' : '';
  syncPortraitUI_();
}

/* ===== 確認画面: 顔イラスト選択・登録 ===== */
function syncPortraitUI_() {
  var field = document.getElementById('portrait-field');
  loadProducers_().then(function (list) {
    field.hidden = false;
    var sel = document.getElementById('producer-select');
    sel.innerHTML = '<option value="">なし</option>' + list.map(function (p) {
      return '<option value="' + escapeHtml(p.イラストFileID) + '">' + escapeHtml(p.名前) + '</option>';
    }).join('');
    if (!state.producerFileId) {
      // 生産者名がマスタと一致したら自動で候補を選ぶ
      var nameEl = document.querySelector('[data-field="生産者"]');
      var name = nameEl ? nameEl.value.trim() : '';
      var hit = list.filter(function (p) { return p.名前 === name; })[0];
      if (hit) state.producerFileId = hit.イラストFileID;
    }
    sel.value = state.producerFileId || '';
    if (sel.value !== (state.producerFileId || '')) { state.producerFileId = ''; sel.value = ''; }  // マスタから消えたID
    updatePortraitThumb_();
  }).catch(function () { field.hidden = true; });  // マスタ取得失敗時は行ごと隠して続行（AI/保存疎結合）
}

function loadProducers_() {
  if (producers_) return Promise.resolve(producers_);
  return runServer('api_listProducers').then(function (list) { producers_ = list; return list; });
}

function updatePortraitThumb_() {
  var img = document.getElementById('portrait-preview');
  if (!state.producerFileId) { img.hidden = true; return; }
  fetchPortrait_(state.producerFileId).then(function (uri) {
    if (uri && state.producerFileId) { img.src = uri; img.hidden = false; } else { img.hidden = true; }
  });
}

document.getElementById('producer-select').addEventListener('change', function () {
  state.producerFileId = this.value;
  updatePortraitThumb_();
});

/* 登録モーダル */
var pmTouch_ = 'suisai';
var pmPhoto_ = null;   // 縮小済み写真 {mimeType, base64}（送信のみ・保存しない）
var pmResult_ = null;  // 生成イラスト {mimeType, base64}

document.getElementById('btn-producer-new').addEventListener('click', function () {
  pmPhoto_ = null; pmResult_ = null;
  var nameEl = document.querySelector('[data-field="生産者"]');
  document.getElementById('pm-name').value = nameEl ? nameEl.value.trim() : '';
  document.getElementById('pm-photo').value = '';
  document.getElementById('pm-preview').hidden = true;
  document.getElementById('pm-save').disabled = true;
  document.getElementById('producer-modal').hidden = false;
});
document.getElementById('pm-cancel').addEventListener('click', function () {
  document.getElementById('producer-modal').hidden = true;
});
document.querySelectorAll('.pm-touch').forEach(function (b) {
  b.addEventListener('click', function () {
    pmTouch_ = b.getAttribute('data-touch');
    document.querySelectorAll('.pm-touch').forEach(function (x) { x.classList.toggle('on', x === b); });
  });
});

/* 写真は最大1024pxに縮小してから送る（通信量とAPI入力を抑える） */
document.getElementById('pm-photo').addEventListener('change', function () {
  var f = this.files[0];
  pmPhoto_ = null;
  if (!f) return;
  var img = new Image();
  var url = URL.createObjectURL(f);
  img.onload = function () {
    URL.revokeObjectURL(url);
    var scale = Math.min(1, 1024 / Math.max(img.width, img.height));
    var cv = document.createElement('canvas');
    cv.width = Math.max(1, Math.round(img.width * scale));
    cv.height = Math.max(1, Math.round(img.height * scale));
    cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
    pmPhoto_ = { mimeType: 'image/jpeg', base64: cv.toDataURL('image/jpeg', 0.9).split(',')[1] };
  };
  img.onerror = function () { URL.revokeObjectURL(url); showError('この画像を読み込めませんでした。別の写真をお試しください。'); };
  img.src = url;
});

document.getElementById('pm-generate').addEventListener('click', function () {
  if (!pmPhoto_) { showError('顔写真を選んでください。'); return; }
  showLoading('似顔絵を描いています…（30秒ほどかかることがあります）');
  runServer('api_generatePortrait', { photo: pmPhoto_, touch: pmTouch_ })
    .then(function (r) {
      hideLoading();
      pmResult_ = r;
      var img = document.getElementById('pm-preview');
      img.src = 'data:' + r.mimeType + ';base64,' + r.base64;
      img.hidden = false;
      document.getElementById('pm-save').disabled = false;
    })
    .catch(function (e) { hideLoading(); showError(e.message); });
});

document.getElementById('pm-save').addEventListener('click', function () {
  var name = document.getElementById('pm-name').value.trim();
  if (!name) { showError('生産者の名前を入れてください。'); return; }
  if (!pmResult_) return;
  showLoading('保存しています…');
  var result = pmResult_;
  runServer('api_saveProducer', { 名前: name, タッチ: pmTouch_, mimeType: result.mimeType, base64: result.base64 })
    .then(function (r) {
      hideLoading();
      producers_ = null;  // マスタを次回再取得
      portraitCache_[r.イラストFileID] = 'data:' + result.mimeType + ';base64,' + result.base64;
      state.producerFileId = r.イラストFileID;
      document.getElementById('producer-modal').hidden = true;
      syncPortraitUI_();
    })
    .catch(function (e) { hideLoading(); showError(e.message); });
});

function collectConfirm_() {
  var get = function (k) {
    var el = document.querySelector('[data-field="' + k + '"]');
    return el ? el.value.trim() : '';
  };
  var lines = function (k) { return get(k).split('\n').map(function (s) { return s.trim(); }).filter(Boolean); };
  if (state.popType === 'product') {
    var priceRaw = get('価格');
    if (!get('商品名')) { showError('商品名は必須です。'); return null; }
    if (priceRaw === '' || isNaN(Number(priceRaw))) { showError('価格は数字で入力してください（必須）。'); return null; }
    if (Number(priceRaw) < 0) { showError('価格は0以上の数字で入力してください。'); return null; }
    return {
      商品名: get('商品名'), 補足: get('補足'), 価格: Number(priceRaw),
      容量: get('容量'), 生産者: get('生産者'), 生産者のひとこと: get('生産者のひとこと'),
      アピールポイント: lines('アピールポイント'),
    };
  }
  if (!get('主題')) { showError('主題は必須です。'); return null; }
  return {
    フック: get('フック'), 主題: get('主題'),
    生産者: get('生産者'), 生産者のひとこと: get('生産者のひとこと'),
    説明文: get('説明文'), 箇条書き: lines('箇条書き'),
    比較データ: lines('比較データ').map(function (l) {
      var p = l.split(',');
      return { ラベル: p[0] || '', 対象値: Number(p[1]), 比較値: Number(p[2] || 1), 単位: p[3] || '倍', 補足: (p[4] || '').trim() };
    }).filter(function (d) { return d.ラベル && isFinite(d.対象値) && d.対象値 >= 0 && isFinite(d.比較値) && d.比較値 > 0; }),
  };
}

function requestCatches() {
  var fields = collectConfirm_();
  if (!fields) return;
  state.fields = fields;
  showLoading('キャッチコピーを考えています…');
  runServer('api_generateCatches', { popType: state.popType, fields: fields })
    .then(function (catches) {
      hideLoading();
      state.catches = catches;
      renderVariants();         // Task 11
      showScreen('variants');
    })
    .catch(function (e) {
      hideLoading();
      // spec: 失敗時は手入力 1 案に退避できる
      showError(e.message + '（「もう一度」か、手入力でキャッチを1つ書いて進むこともできます）', requestCatches);
      var manual = prompt('キャッチコピーを手入力しますか？（キャンセルで中止）');
      if (manual) {
        state.catches = [{ 切り口: '手入力', キャッチ: manual }];
        renderVariants();
        showScreen('variants');
      }
    });
}
document.getElementById('btn-catches').addEventListener('click', requestCatches);
document.getElementById('confirm-back').addEventListener('click', function () { showScreen('input'); });

/* ===== 画面4: 3案選択 ===== */
var PRODUCT_VARIANTS = ['v1', 'v2', 'v3'];
var EXPLAIN_VARIANTS = ['e1', 'e2', 'e3'];

function contentFor_(i) {
  var variants = state.popType === 'product' ? PRODUCT_VARIANTS : EXPLAIN_VARIANTS;
  var c = state.catches[i] || state.catches[0];
  return {
    type: state.popType,
    variant: variants[i % variants.length],
    fontTheme: state.fontTheme, decoTheme: state.decoTheme, fontScale: state.fontScale,
    accent: state.accent,
    adjust: { stamp: state.stampPos, badge: state.badge,
      frame: state.frame, sdeco: state.sdeco, psize: state.psize, ppos: state.ppos },
    producerFileId: state.producerFileId || '',
    catch: c.キャッチ, catchAngle: c.切り口,
    fields: state.fields,
  };
}

function renderVariants() {
  // 似顔絵が未取得なら取得後に一度だけ描き直す
  if (state.producerFileId && !portraitCache_[state.producerFileId]) {
    fetchPortrait_(state.producerFileId).then(function (uri) { if (uri) rerenderKeepSelection_(); });
  }
  var picks = document.getElementById('variant-picks');
  var n = Math.min(3, state.catches.length || 1);
  var html = '';
  for (var i = 0; i < n; i++) {
    var content = contentFor_(i);
    html += '<div class="pick' + (i === 0 ? ' on' : '') + '" data-pick="' + i + '">' +
      '<div class="pick-preview">' + renderPop(withPortrait_(content)) + '</div>' +
      '<div class="radio">' + (i === 0 ? '●' : '○') + ' 案' + (i + 1) + ' ' + escapeHtml(content.catchAngle) + '</div></div>';
  }
  picks.innerHTML = html;
  state.selectedIndex = 0;
  document.getElementById('catch-edit').value = state.catches[0].キャッチ;
  picks.querySelectorAll('[data-pick]').forEach(function (el) {
    el.addEventListener('click', function () {
      state.selectedIndex = Number(el.getAttribute('data-pick'));
      picks.querySelectorAll('.pick').forEach(function (p, j) {
        p.classList.toggle('on', j === state.selectedIndex);
        p.querySelector('.radio').textContent = (j === state.selectedIndex ? '● ' : '○ ') +
          '案' + (j + 1) + ' ' + state.catches[j].切り口;
      });
      document.getElementById('catch-edit').value = state.catches[state.selectedIndex].キャッチ;
    });
  });
  syncThemeButtons_();
}

/* テーマボタンの選択状態＋装飾行の表示（装飾は説明型のみ） */
function syncThemeButtons_() {
  document.querySelectorAll('.ft-btn').forEach(function (b) {
    b.classList.toggle('on', b.getAttribute('data-font') === state.fontTheme);
  });
  document.querySelectorAll('.dc-btn').forEach(function (b) {
    b.classList.toggle('on', b.getAttribute('data-deco') === state.decoTheme);
  });
  document.querySelectorAll('.fs-btn').forEach(function (b) {
    b.classList.toggle('on', Number(b.getAttribute('data-fs')) === state.fontScale);
  });
  document.querySelectorAll('.ac-btn').forEach(function (b) {
    b.classList.toggle('on', b.getAttribute('data-ac') === state.accent);
  });
  document.querySelectorAll('.st-btn').forEach(function (b) {
    b.classList.toggle('on', b.getAttribute('data-st') === state.stampPos);
  });
  document.querySelectorAll('.bd-btn').forEach(function (b) {
    b.classList.toggle('on', (b.getAttribute('data-bd') === '1') === state.badge);
  });
  document.querySelectorAll('.fr-btn').forEach(function (b) {
    b.classList.toggle('on', b.getAttribute('data-fr') === state.frame);
  });
  document.querySelectorAll('.sd-btn').forEach(function (b) {
    b.classList.toggle('on', b.getAttribute('data-sd') === state.sdeco);
  });
  document.querySelectorAll('.ps-btn').forEach(function (b) {
    b.classList.toggle('on', b.getAttribute('data-ps') === state.psize);
  });
  document.querySelectorAll('.pp-btn').forEach(function (b) {
    b.classList.toggle('on', b.getAttribute('data-pp') === state.ppos);
  });
  document.getElementById('deco-row').hidden = (state.popType !== 'explain');
  // スタンプ位置はスタンプ付き装飾（にぎやか/季節）のときだけ意味を持つ
  document.getElementById('stamp-row').hidden =
    !(state.popType === 'explain' && (state.decoTheme === 'lively' || state.decoTheme === 'season'));
  document.getElementById('badge-row').hidden = (state.popType !== 'product');
  document.getElementById('sdeco-row').hidden = (state.popType !== 'product');
  // 似顔絵の大きさ・位置は似顔絵を選んでいるときだけ
  var noPortrait = !state.producerFileId;
  document.getElementById('psize-row').hidden = noPortrait;
  document.getElementById('ppos-row').hidden = noPortrait;
}

/* テーマ変更後に3案を再描画し、選択中の案・キャッチ編集を維持 */
function rerenderKeepSelection_() {
  var sel = state.selectedIndex;
  renderVariants();
  state.selectedIndex = sel;
  var picks = document.getElementById('variant-picks');
  picks.querySelectorAll('.pick').forEach(function (p, j) {
    p.classList.toggle('on', j === sel);
    p.querySelector('.radio').textContent = (j === sel ? '● ' : '○ ') + '案' + (j + 1) + ' ' + state.catches[j].切り口;
  });
  document.getElementById('catch-edit').value = state.catches[sel].キャッチ;
}

document.querySelectorAll('.ft-btn').forEach(function (b) {
  b.addEventListener('click', function () { state.fontTheme = b.getAttribute('data-font'); rerenderKeepSelection_(); });
});
document.querySelectorAll('.dc-btn').forEach(function (b) {
  b.addEventListener('click', function () { state.decoTheme = b.getAttribute('data-deco'); rerenderKeepSelection_(); });
});
document.querySelectorAll('.fs-btn').forEach(function (b) {
  b.addEventListener('click', function () { state.fontScale = Number(b.getAttribute('data-fs')); rerenderKeepSelection_(); });
});
document.querySelectorAll('.ac-btn').forEach(function (b) {
  b.addEventListener('click', function () { state.accent = b.getAttribute('data-ac'); rerenderKeepSelection_(); });
});
document.querySelectorAll('.st-btn').forEach(function (b) {
  b.addEventListener('click', function () { state.stampPos = b.getAttribute('data-st'); rerenderKeepSelection_(); });
});
document.querySelectorAll('.bd-btn').forEach(function (b) {
  b.addEventListener('click', function () { state.badge = b.getAttribute('data-bd') === '1'; rerenderKeepSelection_(); });
});
document.querySelectorAll('.fr-btn').forEach(function (b) {
  b.addEventListener('click', function () { state.frame = b.getAttribute('data-fr'); rerenderKeepSelection_(); });
});
document.querySelectorAll('.sd-btn').forEach(function (b) {
  b.addEventListener('click', function () { state.sdeco = b.getAttribute('data-sd'); rerenderKeepSelection_(); });
});
document.querySelectorAll('.ps-btn').forEach(function (b) {
  b.addEventListener('click', function () { state.psize = b.getAttribute('data-ps'); rerenderKeepSelection_(); });
});
document.querySelectorAll('.pp-btn').forEach(function (b) {
  b.addEventListener('click', function () { state.ppos = b.getAttribute('data-pp'); rerenderKeepSelection_(); });
});
/* キャッチ編集をライブ反映（改行含む）: 入力のたびに選択案のプレビューを更新 */
document.getElementById('catch-edit').addEventListener('input', function () {
  if (!state.catches.length) return;
  state.catches[state.selectedIndex].キャッチ = this.value;
  var picks = document.getElementById('variant-picks');
  var cell = picks.querySelectorAll('.pick-preview')[state.selectedIndex];
  if (cell) cell.innerHTML = renderPop(withPortrait_(contentFor_(state.selectedIndex)));
});

/* 別の言い回しで再生成（直前の3案を avoid として渡し、似た案を避ける） */
document.getElementById('btn-recatch').addEventListener('click', function () {
  if (!state.fields) return;
  var avoid = state.catches.map(function (c) { return c.キャッチ; });
  showLoading('別の言い回しを考えています…');
  runServer('api_generateCatches', { popType: state.popType, fields: state.fields, avoid: avoid })
    .then(function (catches) {
      hideLoading();
      state.catches = catches;
      renderVariants();
    })
    .catch(function (e) { hideLoading(); showError(e.message); });
});

document.getElementById('btn-select').addEventListener('click', function () {
  var edited = document.getElementById('catch-edit').value.trim();
  if (edited) state.catches[state.selectedIndex].キャッチ = edited;
  state.content = contentFor_(state.selectedIndex);
  state.fromReprint = false;   // 通常フロー: 「もどる」は案選択画面へ
  renderPrint();               // Task 12
  showScreen('print');
});
document.getElementById('variants-back').addEventListener('click', function () {
  renderConfirm();
  showScreen('confirm');
});

/* ===== 画面5: 印刷・保存 ===== */
function renderPrint() {
  var c = state.content;
  document.getElementById('print-preview').innerHTML = renderPop(withPortrait_(c));
  // 再印刷など未取得の似顔絵は、取得後に一度だけ描き直す
  if (c.producerFileId && !portraitCache_[c.producerFileId]) {
    fetchPortrait_(c.producerFileId).then(function (uri) {
      if (uri && state.content === c) {
        document.getElementById('print-preview').innerHTML = renderPop(withPortrait_(c));
      }
    });
  }
}

function popRecord_() {
  var f = state.content.fields;
  return {
    種別: state.content.type === 'product' ? '商品型' : '説明型',
    サイズ: state.content.type === 'product' ? '棚札' : 'A4縦',
    商品名: state.content.type === 'product' ? f.商品名 : f.主題,
    内容JSON: JSON.stringify(state.content),
  };
}

function capturePng_() {
  // spec: html2canvas 未ロード(CDN障害等)でも同期throwさせず、PNG無しで保存を継続する
  if (typeof html2canvas !== 'function') return Promise.resolve(null);
  var area = document.getElementById('print-area');
  area.innerHTML = renderPop(withPortrait_(state.content));
  return Promise.resolve().then(function () {
    return html2canvas(area.firstElementChild, { scale: 1.5 });
  })
    .then(function (canvas) {
      area.innerHTML = '';
      return canvas.toDataURL('image/png').split(',')[1];
    })
    .catch(function (e) {
      area.innerHTML = '';
      console.warn('html2canvas 失敗:', e);
      return null;  // spec: 印刷・保存は PNG 無しで続行
    });
}

var saved_ = false;
var saving_ = false;
function savePopWithPng_() {
  if (saved_ || saving_) return Promise.resolve();
  saving_ = true;
  var status = document.getElementById('save-status');
  status.textContent = '履歴に保存しています…';
  // Promise.resolve().then で包み、capturePng_ 側の万一の同期throwも catch に必ず流す
  return Promise.resolve().then(function () {
    return capturePng_();
  }).then(function (png) {
    return runServer('api_savePop', popRecord_(), png).then(function (r) {
      saved_ = true;
      saving_ = false;
      status.textContent = '✓ 履歴に保存しました（' + r.id + '）' +
        (r.thumbnailSaved ? '' : ' ※サムネイル画像は保存できませんでした（再印刷は可能です）');
    });
  }).catch(function (e) {
    saving_ = false;
    status.innerHTML = '保存に失敗しました: ' + escapeHtml(e.message) +
      ' <button class="btn mini" id="save-retry">保存を再試行</button>';
    document.getElementById('save-retry').addEventListener('click', savePopWithPng_);
  });
}

document.getElementById('btn-print').addEventListener('click', function () {
  if (saving_) return;
  var area = document.getElementById('print-area');
  area.innerHTML = renderPop(withPortrait_(state.content));
  window.print();
  area.innerHTML = '';
  savePopWithPng_();   // 印刷ダイアログ後に保存（spec: 保存失敗でも印刷は成立）
});
document.getElementById('print-back').addEventListener('click', function () {
  if (state.fromReprint) { loadHome(); }
  else { saved_ = false; showScreen('variants'); }
});
document.getElementById('print-home').addEventListener('click', loadHome);

loadHome();
</script>
