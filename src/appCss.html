<style>
/* ===== ページ全体（モック共通リセット） ===== */
* { box-sizing: border-box; }
body {
  margin: 0; padding: 0;
  font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
  background: #efece6;
  color: var(--ink);
  line-height: 1.6;
}

/* ===== システム画面共通（モックからコピー） ===== */
.app-top {
  background: var(--orange); color: #fff; padding: 10px 20px;
  display: flex; justify-content: space-between; align-items: center;
}
.app-top .brand { font-weight: 700; }
.app-top .user { font-size: .72rem; opacity: .9; }

.steps { display: flex; gap: 8px; font-size: .72rem; margin-bottom: 18px; flex-wrap: wrap; }
.stepchip { padding: 3px 12px; border-radius: 999px; background: #efece6; color: #8a8375; }
.stepchip.on { background: var(--ink); color: #fff; font-weight: 700; }

.btn {
  display: inline-block; background: var(--orange); color: #fff; font-weight: 700;
  border: none; border-radius: 10px; padding: 12px 26px; font-size: .95rem;
  box-shadow: 0 2px 6px rgba(232,115,12,.3); cursor: pointer;
}
.btn.big { font-size: 1.05rem; padding: 16px 34px; }
.btn.ghost { background: #fff; color: var(--orange); border: 2px solid var(--orange); box-shadow: none; }
.btn.mini { font-size: .72rem; padding: 5px 14px; border-radius: 7px; }

.field { margin-bottom: 18px; }
.field label { display: block; font-size: .9rem; font-weight: 700; color: #5a5245; margin-bottom: 7px; letter-spacing: .02em; }
.field .input {
  display: block; width: 100%;
  border: 1.5px solid #ddd6c6; border-radius: 12px; padding: 13px 16px; background: #fefdfb;
  font-size: 1.02rem; color: var(--ink); font-family: inherit;
  transition: border-color .15s, box-shadow .15s;
}
.field .input::placeholder { color: #b5ac9b; }
.field .input:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 3px rgba(232,115,12,.15); background: #fff; }
textarea.input, .input.area { min-height: 96px; line-height: 1.7; resize: vertical; }
/* 価格など強調フィールド */
.field.warn .input { border-color: var(--red); border-width: 2px; background: #fff8f7; font-weight: 700; }
.field.warn label { color: var(--red); }
.field .hint { font-size: .78rem; color: var(--red); margin-top: 5px; line-height: 1.5; }

/* ===== フォントテーマ切替（3案画面） ===== */
.fonttheme { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.fonttheme .ft-label { font-size: .82rem; font-weight: 700; color: #6b655c; }
.ft-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.ft-btn, .dc-btn, .fs-btn {
  font-family: inherit; font-size: .85rem; font-weight: 700; padding: 8px 16px;
  border: 2px solid #ddd6c6; background: #fff; color: #8a8375; border-radius: 999px; cursor: pointer;
  transition: all .15s;
}
.ft-btn.on, .dc-btn.on, .fs-btn.on { border-color: var(--orange); background: #fdf3e7; color: var(--orange); }

.choice-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
.choice {
  border: 2px solid #d8d2c4; border-radius: 12px; padding: 14px; text-align: center;
  background: #fff; font-size: .88rem; cursor: pointer;
}
.choice .ic { font-size: 1.5rem; display: block; margin-bottom: 4px; }
.choice.on { border-color: var(--orange); background: #fdf3e7; font-weight: 700; }
.choice .sub2 { display: block; font-size: .7rem; color: #8a8375; font-weight: 400; margin-top: 3px; }
.dropzone {
  border: 2px dashed #c9c2b2; border-radius: 12px; padding: 22px; text-align: center;
  color: #8a8375; font-size: .85rem; background: #faf8f3; cursor: pointer;
}
.pick { cursor: pointer; }
.ai-note {
  background: #fdf3e7; border-left: 4px solid var(--orange); border-radius: 0 8px 8px 0;
  padding: 10px 16px; font-size: .82rem; margin-bottom: 18px;
}

.history-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; margin-top: 18px; }
.history-card .pick-preview { margin-bottom: 8px; }
.history-card { background: #faf8f3; border: 1px solid #e4ddcd; border-radius: 10px; padding: 10px; }
.history-card .meta { font-size: .72rem; color: #6b655c; margin: 8px 0 6px; line-height: 1.4; }
.history-card .meta b { color: var(--ink); font-size: .8rem; }

/* auto-fit: 案が1〜2件でも空列を作らず左詰め。最大幅は3列時の実カード幅に合わせて頭打ち
   （1fr にすると案が1件のときカードが横幅いっぱいに伸びて余白過多になるため固定上限にする） */
.pick-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 273px)); justify-content: start; gap: 14px; }
.pick { border: 2px solid #d8d2c4; border-radius: 12px; padding: 10px; background: #fff; text-align: center; }
.pick.on { border-color: var(--orange); background: #fdf3e7; box-shadow: 0 0 0 3px rgba(232,115,12,.15); }
.pick .radio { font-size: .78rem; margin-top: 8px; color: #6b655c; }
.pick.on .radio { color: var(--orange); font-weight: 700; }
.print-note { font-size: .8rem; color: #6b655c; background: #faf8f3; border-radius: 8px; padding: 12px 14px; margin-top: 14px; }

/* ===== サムネ縮小（transform scale方式） =====
   popStyles.html のフォントは clamp(px, Nvw, px) でビューポート基準のため、
   親の font-size を変えても縮小できない。実レンダリングを基準幅720pxで描画し、
   transform: scale() でカードに収まる倍率まで丸ごと縮小する。
   0.34 = 720幅で描いた実物を 3列時の実カード内寸（約253px）に収める倍率（実測調整）。
   .pick-preview の高さは 720幅時点の高さ×倍率を明示指定して余白を潰す
   （商品型 shelf=180/70、説明型 a4=210/297 でアスペクト比が異なるため :has() で出し分け）。 */
.pick-preview {
  --pick-scale: 0.34;
  overflow: hidden;
}
.pick-preview .pop {
  width: 720px;
  transform-origin: top left;
  /* !important: popStyles.html の .shelf.v1/.v2/.v3 は rotate() 指定を持ち、
     クラス2つ（.shelf.v1 等）で本ルール（.pick-preview .pop = クラス2つ）と詳細度が同点。
     popStyles.html は appCss.html より後に読み込まれるため、通常は rotate() が後勝ちしてしまい
     縮小が効かなくなる。サムネ用途に限定してスケールを必ず勝たせるため !important で上書きする。 */
  transform: scale(var(--pick-scale)) !important;
  pointer-events: none;
}
.pick-preview:has(.pop.shelf) { height: calc(280px * var(--pick-scale)); }     /* 720 * 70/180 */
.pick-preview:has(.pop.a4) { height: calc(1017.14px * var(--pick-scale)); }    /* 720 * 297/210 */

@media (max-width: 640px) {
  /* minmax(0, 1fr) であって単なる 1fr ではない点に注意:
     bare 1fr は minmax(auto, 1fr) 相当になり、"auto" 最小サイズはグリッドアイテムの
     内容依存の自動最小サイズ計算を発動させる。.pick-preview 配下の .pop は
     width:720px を明示指定しているため、auto のままだとそのサイズがそのまま
     グリッドトラックの最小幅として伝播し、カードが 720px 相当まで肥大化してしまう
     （scale() は見た目だけ縮小するがレイアウト上のサイズは変えないため）。
     最小値を 0 に明示することでこの自動最小サイズ計算を無効化し、正しく画面幅に収まる。 */
  .history-grid, .pick-row { grid-template-columns: minmax(0, 1fr); }
  /* 1列表示になりカード幅が広がるため、縮小率も上げてサムネ周りの余白を詰める */
  .pick-preview { --pick-scale: 0.44; }
}
</style>
<style>
/* hidden 属性を最優先。.loading/.error-bar/.btn 等の display 指定より hidden を勝たせる */
[hidden] { display: none !important; }
main { max-width: 880px; margin: 0 auto; padding: 20px 16px 60px; }
.center { text-align: center; margin: 18px 0; }
h2.sec { font-size: 1rem; font-weight: 700; margin: 26px 0 4px; }
.muted { color: #8a8375; font-size: .85rem; }
.loading { position: fixed; inset: 0; background: rgba(255,255,255,.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
.spinner { width: 42px; height: 42px; border: 4px solid #eee; border-top-color: var(--orange); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-bar { position: fixed; top: 0; left: 0; right: 0; background: #d33a2c; color: #fff; padding: 10px 16px; display: flex; gap: 10px; align-items: center; z-index: 60; }
#print-area { position: absolute; left: -9999px; top: 0; }
@media print { main, header, .loading, .error-bar { display: none !important; } }
</style>
