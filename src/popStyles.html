<style>
  :root {
    --ink: #2b2620; --paper-cream: #f7efd8; --paper-white: #fdfcf8; --paper-beige: #f2ecda;
    --orange: #e8730c; --red: #d33a2c; --green: #4a7c3f; --pink: #c9457c;
    --bar-green: #7cbf6b; --bar-pink: #ef9db8;
  }

  /* ===== 共通 ===== */
  .pop, .pop * { box-sizing: border-box; }
  .pop {
    position: relative; overflow: hidden;
    box-shadow: 0 6px 22px rgba(60,40,10,.2);
    container-type: inline-size;
    font-family: "Klee One", "Hiragino Maru Gothic ProN", sans-serif;  /* 本文（既定=筆テーマの本文） */
  }

  /* ===== フォントテーマ（.pop に theme-* を付与） ===== */
  /* 見出し（商品名・大見出し・バッジ・締め・✔） */
  .pop.theme-fude .name, .pop.theme-fude .zip, .pop.theme-fude .q1 .em,
  .pop.theme-fude .q2, .pop.theme-fude .theme, .pop.theme-fude .foot, .pop.theme-fude .hook-lead {
    font-family: "Yuji Syuku", serif;
  }
  .pop.theme-fude { font-family: "Klee One", sans-serif; }
  .pop.theme-fude .price, .pop.theme-fude .mult, .pop.theme-fude .big { font-family: "Dela Gothic One", sans-serif; }

  .pop.theme-pen { font-family: "Klee One", sans-serif; }
  .pop.theme-pen .name, .pop.theme-pen .zip, .pop.theme-pen .q1 .em,
  .pop.theme-pen .q2, .pop.theme-pen .theme, .pop.theme-pen .foot, .pop.theme-pen .hook-lead { font-family: "Klee One", sans-serif; }
  .pop.theme-pen .price, .pop.theme-pen .mult, .pop.theme-pen .big { font-family: "Mochiy Pop One", sans-serif; }

  .pop.theme-pop { font-family: "Hachi Maru Pop", sans-serif; }
  .pop.theme-pop .name, .pop.theme-pop .zip, .pop.theme-pop .q1 .em,
  .pop.theme-pop .q2, .pop.theme-pop .theme, .pop.theme-pop .foot, .pop.theme-pop .hook-lead { font-family: "Hachi Maru Pop", sans-serif; }
  .pop.theme-pop .price, .pop.theme-pop .mult, .pop.theme-pop .big { font-family: "Mochiy Pop One", sans-serif; }

  /* ===== 商品型（棚札 180×70mm） ===== */
  .shelf {
    aspect-ratio: 180 / 70; width: 100%; padding: 3.4% 4.2%;
    display: grid; grid-template-columns: 1fr auto; grid-template-rows: auto 1fr auto; column-gap: 3%;
  }
  .shelf .catch { grid-column: 1/3; font-size: calc(4cqw * var(--fs,1)); font-weight: 700; line-height: 1.3; overflow: hidden;
    display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; text-wrap: balance; }
  .shelf .catch .zip { display: inline-block; color: #fff; font-size: calc(3.8cqw * var(--fs,1)); padding: 1px 12px; border-radius: 5px; transform: rotate(-3deg); white-space: nowrap; margin-right: 10px; vertical-align: middle; }
  .shelf .name-wrap { grid-column: 1/2; grid-row: 2/3; align-self: center; min-width: 0; overflow: hidden; }
  /* 長い商品名は最大2行で折り返して切れないようにする */
  .shelf .name { font-size: calc(7.5cqw * var(--fs,1)); line-height: 1.05; overflow-wrap: anywhere; word-break: auto-phrase;
    display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; }
  /* 8文字以上の長い商品名は自動で少し縮めて1行に収める（筆フォントは字幅が広いため） */
  .shelf .name.long { font-size: calc(5.8cqw * var(--fs,1)); }
  .shelf .reading { font-size: calc(2.9cqw * var(--fs,1)); color: #7a6f57; margin-top: 3px; }
  .shelf .price { grid-column: 2/3; grid-row: 2/3; align-self: center; justify-self: end; font-size: calc(11cqw * var(--fs,1)); line-height: .82; white-space: nowrap; text-align: right; }
  .shelf .price .yen { font-size: .36em; }
  .shelf .price .tax { display: block; font-size: .26em; font-family: "Klee One", sans-serif; color: #8a7a55; margin-top: 2px; }
  .shelf .foot { grid-column: 1/3; grid-row: 3/4; align-self: end; display: flex; align-items: flex-end; gap: 14px; font-size: calc(3.4cqw * var(--fs,1)); color: #5a5030; }
  .shelf .foot b { color: var(--ink); }
  .shelf .foot .foot-l { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 10px; }
  /* 名札（生産者名） */
  .shelf .ptag { flex-shrink: 0; border: 2px solid var(--ink); border-radius: 8px 3px 9px 3px; padding: 0 10px;
    background: rgba(255,255,255,.75); color: var(--ink); font-weight: 700; transform: rotate(-1deg); }
  /* 生産者のひとこと（1〜2行でクランプ） */
  .shelf .pquote { min-width: 0; font-size: calc(3.1cqw * var(--fs,1)); color: var(--ink); line-height: 1.3;
    display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; }
  /* 手描き風の波線下線（価格の下・v1/v3） */
  .shelf.v1 .price::after, .shelf.v3 .price::after { content: ''; display: block; height: 1.3cqw; margin-top: .7cqw;
    background: radial-gradient(circle at 50% 0, transparent 52%, currentColor 58% 74%, transparent 80%) 0 0/10px 100%; opacity: .6; }

  /* v1 クラフト×オレンジ */
  .shelf.v1 { background: repeating-linear-gradient(0deg,transparent 0 38px,rgba(150,110,50,.05) 38px 39px),linear-gradient(160deg,#f7efd8,#eddfbe); transform: rotate(-.4deg); }
  .shelf.v1 .zip { background: var(--red); } .shelf.v1 .catch .o { color: var(--orange); } .shelf.v1 .price { color: var(--orange); transform: rotate(-2deg); text-shadow: 2px 2px 0 rgba(0,0,0,.05); }
  /* v2 白×赤・手描き枠 */
  .shelf.v2 { background: var(--paper-white); border: 4px solid var(--red); border-radius: 180px 14px 170px 14px/14px 170px 14px 180px; transform: rotate(.3deg); }
  .shelf.v2 .zip { background: var(--ink); } .shelf.v2 .catch .o { color: var(--red); } .shelf.v2 .name { text-decoration: underline wavy rgba(211,58,44,.5) 2.5px; text-underline-offset: 8px; } .shelf.v2 .price { color: var(--red); }
  /* v3 ベージュ×緑・破線 */
  .shelf.v3 { background: linear-gradient(160deg,#f2ecda,#e9e0c6); outline: 2.5px dashed rgba(74,124,63,.55); outline-offset: -9px; transform: rotate(-.3deg); }
  .shelf.v3 .zip { background: var(--green); } .shelf.v3 .catch .o { color: var(--green); } .shelf.v3 .price { color: var(--green); }

  /* ===== 説明型（A4 210×297mm） ===== */
  .a4 { aspect-ratio: 210 / 297; width: 100%; position: relative; }
  .a4 .a4-body {
    position: relative; z-index: 1; height: 100%; padding: 6% 6.5%;
    display: flex; flex-direction: column; gap: 2%;
  }
  /* 中央コンテンツ（グラフ/カード/リスト）を残り高さいっぱいに広げ余白を消す */
  .a4 .a4-mid { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: safe center; gap: 3%; }
  /* 基本背景（装飾テーマ未指定/素朴のとき） */
  .a4.e1 { background: linear-gradient(170deg,#fbf6e6,#f1e7cd); }
  .a4.e2 { background: var(--paper-white); }
  .a4.e3 { background: linear-gradient(170deg,#f2ecda,#e9e0c6); }

  /* ===== 装飾テーマ（説明型に適用・オーバーレイ層） ===== */
  .a4.deco-lively { background:
      repeating-linear-gradient(60deg, rgba(74,124,63,.06) 0 1px, transparent 1px 26px),
      repeating-linear-gradient(-60deg, rgba(74,124,63,.06) 0 1px, transparent 1px 26px),
      repeating-linear-gradient(0deg, rgba(74,124,63,.06) 0 1px, transparent 1px 15px),
      linear-gradient(170deg,#f3f6ee,#e7efdd); }
  .a4.deco-season { background:
      radial-gradient(circle, rgba(229,137,168,.12) 2px, transparent 2.5px) 0 0/22px 22px,
      linear-gradient(170deg,#fdf3f5,#f8e8ec); }
  .a4.deco-wamodern { background:
      radial-gradient(circle at 50% 100%, transparent 30%, rgba(70,110,150,.08) 30% 33%, transparent 33%) 0 0/40px 20px,
      radial-gradient(circle at 0% 100%, transparent 30%, rgba(70,110,150,.08) 30% 33%, transparent 33%) 20px 0/40px 20px,
      linear-gradient(170deg,#f2f5f8,#e6edf3); }
  .a4.deco-plain { background:
      radial-gradient(circle, rgba(150,110,50,.09) 1.5px, transparent 1.6px) 0 0/16px 16px,
      linear-gradient(170deg,#fbf6e6,#f1e7cd); }

  /* 装飾パーツ */
  .a4 .deco { position: absolute; z-index: 0; pointer-events: none; }
  .a4 .inner-frame { position: absolute; inset: 3.5cqw; z-index: 0; pointer-events: none; }
  .a4.deco-plain .inner-frame { border: 2px dashed #c9a24a; }
  .a4.deco-wamodern .inner-frame { border: 4px double #7a9bbf; }
  .a4 .corner { width: 15cqw; height: 15cqw; opacity: .55; }
  .a4 .corner.tl { top: 3cqw; left: 3cqw; }
  .a4 .corner.tr { top: 3cqw; right: 3cqw; transform: scaleX(-1); }
  .a4 .corner.bl { bottom: 3cqw; left: 3cqw; transform: scaleY(-1); }
  .a4 .corner.br { bottom: 3cqw; right: 3cqw; transform: scale(-1); }
  .a4 .stamp { position: absolute; top: 3cqw; right: 3cqw; width: 16cqw; height: 16cqw; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; text-align: center; font-family: "Yuji Syuku", serif; font-weight: 700;
    color: #fff; font-size: calc(4.6cqw * var(--fs,1)); line-height: 1.1; transform: rotate(-12deg); z-index: 3; box-shadow: 0 2px 5px rgba(0,0,0,.15); background: var(--orange); border: 2px solid rgba(255,255,255,.6); }
  .a4 .tape { position: absolute; top: -1cqw; width: 22cqw; height: 6.5cqw; background: rgba(230,200,120,.55); box-shadow: 0 1px 3px rgba(0,0,0,.1); z-index: 3; }
  .a4 .tape.l { left: 7cqw; transform: rotate(-4deg); } .a4 .tape.r { right: 7cqw; transform: rotate(3deg); }

  /* 共通見出し（長文キャッチでもはみ出さない控えめサイズ＋balance改行） */
  .a4 .q1 { text-align: center; font-size: calc(5cqw * var(--fs,1)); font-weight: 700; color: #3a3226; text-wrap: balance; }
  .a4 .q1 .em { font-size: 2.2em; color: var(--green); vertical-align: -.12em; }
  .a4 .q2 { text-align: center; font-size: calc(4.8cqw * var(--fs,1)); color: #3a3226; line-height: 1.45; }
  .a4 .q2 .qm { color: var(--orange); }
  .a4 .theme { text-align: center; font-size: calc(7cqw * var(--fs,1)); line-height: 1.3; color: var(--ink); text-wrap: balance; }
  .a4.e2 .theme { color: var(--ink); }
  .a4.e3 .theme { color: var(--green); text-align: left; }
  .a4 .hook { font-size: calc(4.4cqw * var(--fs,1)); color: #5a5030; text-wrap: balance; }
  .a4 .body-text { font-size: calc(3.5cqw * var(--fs,1)); line-height: 1.7; color: #3a3226; text-wrap: pretty; }
  .a4 .foot { text-align: center; font-size: calc(5.2cqw * var(--fs,1)); color: var(--ink); line-height: 1.5; text-wrap: balance; }
  .a4 .foot .mk, .a4 .body-text .mk { background: linear-gradient(transparent 58%,#ffe08a 58%); }
  /* 日本語を文節単位で改行（不自然な語中改行を防ぐ・Chrome） */
  .a4 .q1, .a4 .theme, .a4 .foot, .a4 .hook, .a4 .list li, .chart .cap, .numcard .vs, .shelf .catch { word-break: auto-phrase; }
  /* スタンプ有りの装飾では、最初の見出し(q1/theme/hook)の右上をスタンプ分あけて重なり回避 */
  .a4.deco-lively .a4-body > :first-child, .a4.deco-season .a4-body > :first-child { padding-right: 18cqw; }

  /* 棒グラフ */
  .charts { display: flex; gap: 6%; }
  .chart { flex: 1; text-align: center; }
  .chart .metric { display: inline-block; background: var(--green); color: #fff; font-weight: 700; font-size: calc(4cqw * var(--fs,1)); padding: 2px 12px; border-radius: 16px; }
  .chart.fe .metric { background: var(--pink); }
  .chart .mult { font-size: calc(11cqw * var(--fs,1)); color: var(--green); line-height: .9; margin: 2% 0 1%; transform: rotate(-4deg); white-space: nowrap; }
  .chart.fe .mult { color: var(--pink); }
  .chart .bars { display: flex; align-items: flex-end; justify-content: center; gap: 14%; height: 26cqw; border-bottom: 3px solid var(--ink); padding: 0 6%; }
  .chart .bar { width: 36%; border: 2.5px solid var(--ink); border-bottom: none; }
  .chart .bar.hi { background: repeating-linear-gradient(45deg,var(--bar-green) 0 6px,#a8d99a 6px 12px); }
  .chart.fe .bar.hi { background: repeating-linear-gradient(45deg,var(--bar-pink) 0 6px,#f7c3d5 6px 12px); }
  .chart .bar.lo { background: #fff; }
  .chart .lg { display: flex; justify-content: center; gap: 14%; padding: 0 6%; font-size: calc(4cqw * var(--fs,1)); margin-top: 6px; font-weight: 700; }
  .chart .lg span { width: 36%; }
  .chart .cap { font-size: calc(3.4cqw * var(--fs,1)); color: #5a5030; margin-top: 6px; text-wrap: balance; }

  /* 数字カード（e2） */
  .numbers { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 5%; }
  .numcard { border: 3px solid var(--ink); border-radius: 165px 15px 155px 15px/15px 155px 15px 165px; padding: 14% 3%; text-align: center; }
  .numcard .label { font-size: calc(4.4cqw * var(--fs,1)); font-weight: 700; }
  .numcard .big { font-size: calc(13.5cqw * var(--fs,1)); line-height: 1; margin: 7% 0; white-space: nowrap; }
  .numcard.g .big { color: var(--green); } .numcard.p .big { color: var(--pink); }
  .numcard .vs { font-size: calc(3.9cqw * var(--fs,1)); color: #6b655c; text-wrap: balance; }
  /* 数字カード無し時の全幅ボックス */
  .pointlist { display: flex; flex-direction: column; gap: 4%; }
  .pointbox { border: 3px solid var(--ink); border-radius: 155px 12px 145px 12px/12px 145px 12px 155px; padding: 4.5% 6%; font-size: calc(5cqw * var(--fs,1)); font-weight: 700; text-align: center; }

  /* 生産者のひとこと吹き出し（説明型） */
  .quote { position: relative; margin-top: 2%; padding: 3.2% 5% 2.6%; background: var(--paper-white);
    border: 2.5px solid var(--ink); border-radius: 145px 18px 155px 18px/18px 155px 18px 145px;
    transform: rotate(-.6deg); }
  .quote::after { content: ''; position: absolute; left: 13%; bottom: -1.8cqw; width: 3.2cqw; height: 3.2cqw;
    background: var(--paper-white); border-right: 2.5px solid var(--ink); border-bottom: 2.5px solid var(--ink);
    transform: rotate(45deg); }
  .quote .qtext { font-size: calc(4.4cqw * var(--fs,1)); line-height: 1.55; color: var(--ink); word-break: auto-phrase; }
  .quote .qwho { text-align: right; font-size: calc(3cqw * var(--fs,1)); color: #7a6f57; margin-top: 1%; }

  /* チェックリスト（手書きの揺らぎ: 行ごとに微妙な傾き） */
  .list { list-style: none; display: flex; flex-direction: column; gap: 5%; flex: 1; justify-content: center; }
  .list li:nth-child(odd) { transform: rotate(-.35deg); }
  .list li:nth-child(even) { transform: rotate(.3deg); }
  .list li { display: flex; gap: 14px; align-items: baseline; font-size: calc(5.4cqw * var(--fs,1)); font-weight: 700; }
  .list .mark { color: var(--orange); flex-shrink: 0; }
  .list b { background: linear-gradient(transparent 55%,#ffe08a 55%); }
</style>
<style>
/* ===== 印刷（mm 固定） ===== */
@media print {
  body * { visibility: hidden; }
  #print-area, #print-area * { visibility: visible; }
  #print-area { position: absolute; left: 0; top: 0; margin: 0; }
  #print-area .pop.shelf { width: 180mm; height: 70mm; margin: 40mm auto 0; box-shadow: none; transform: none; }
  #print-area .pop.a4 { width: 210mm; height: 297mm; margin: 0; box-shadow: none; }
}
@page { size: A4 portrait; margin: 0; }
</style>
