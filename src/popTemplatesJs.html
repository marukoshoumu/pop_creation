<script>
// 自動生成: shared/popTemplates.js から build-shared.sh が生成。直接編集しない
/**
 * POP テンプレート（純粋関数）。ブラウザ（build 生成の popTemplatesJs.html）と
 * Node テストの両方から使う。GAS サーバーでは使わない。
 * 【生命線】fields の値は escapeHtml 以外の加工をせずそのまま出力する。
 */

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/** エスケープ後、改行(\n)を <br> に変換（キャッチの任意改行を反映）。
 * 空行（連続改行）は1つの <br> にまとめる — 棚札の行数制限に空行が食われて文字が消えるのを防ぐ */
function nl2brHtml_(s) {
  return escapeHtml(s).replace(/(?:[ \t]*\r?\n)+[ \t]*/g, '<br>');
}

/** 末尾の ？/? を強調 span で包む（見出し用）。改行も反映 */
function emphasizeQ_(s) {
  return nl2brHtml_(s).replace(/([？?])\s*$/, '<span class="qm">$1</span>');
}

function themeClass_(content) {
  var t = content.fontTheme;
  if (t !== 'pen' && t !== 'pop') t = 'fude';  // 既定=筆
  return 'theme-' + t;
}

/** 微調整: 文字サイズ倍率 --fs のインラインスタイル（既定 1） */
function fsStyle_(content) {
  var s = Number(content.fontScale);
  if (!isFinite(s) || s <= 0 || s === 1) return '';
  return ' style="--fs:' + s + '"';
}

function decoName_(content) {
  var d = content.decoTheme;
  if (d !== 'lively' && d !== 'season' && d !== 'wamodern') d = 'plain';  // 既定=素朴
  return d;
}

/* ===== 微調整B-lite: 色あい・パーツ表示/位置（内容JSONに保存され再印刷で復元） ===== */
var ACCENTS_ = { red: 1, green: 1, orange: 1, pink: 1 };

/** 色あい: accent-* が --ac を定義し、has-ac がアクセント要素を一括上書きする */
function accentClass_(content) {
  var a = content.accent;
  return ACCENTS_[a] ? ' accent-' + a + ' has-ac' : '';
}

function adjustOf_(content) {
  return content.adjust || {};
}

/** スタンプ位置(tr/tl/off)をルートクラスにも出す（見出しの逃げパディング切替用） */
function stampClass_(content) {
  var s = adjustOf_(content).stamp;
  if (s === 'tl') return ' stamp-tl';
  if (s === 'off') return ' stamp-off';
  return '';
}

/** 似顔絵の大きさ(s/m/l 既定m)・位置(l/r 既定l) */
function portraitAdjustClass_(content) {
  var a = adjustOf_(content);
  var cls = '';
  if (a.psize === 's' || a.psize === 'l') cls += ' psize-' + a.psize;
  if (a.ppos === 'r') cls += ' ppos-r';
  return cls;
}

/** 枠線プリセット(hand/dash/double/none)。未指定は案の標準枠 */
var FRAMES_ = { hand: 1, dash: 1, double: 1, none: 1 };
function frameClass_(content) {
  var f = adjustOf_(content).frame;
  return FRAMES_[f] ? ' frame-' + f : '';
}

/** 棚札の飾り(tape/osusume/shun)。スタンプ時はルートに sdeco-stamp（キャッチの逃げ用） */
function shelfDecoHtml_(content) {
  var d = adjustOf_(content).sdeco;
  if (d === 'tape') return '<div class="deco tape l"></div><div class="deco tape r"></div>';
  if (d === 'osusume') return '<div class="stamp sh">おす<br>すめ</div>';  // 折返し位置を固定（おすす/め は不自然）
  if (d === 'shun') return '<div class="stamp sh sk">旬</div>';
  return '';
}
function shelfDecoClass_(content) {
  var d = adjustOf_(content).sdeco;
  return (d === 'osusume' || d === 'shun') ? ' sdeco-stamp' : '';
}

/** 桜/角飾りの SVG（説明型 装飾用） */
function cornerSvg_(pos, kind) {
  if (kind === 'sakura') {
    return '<svg class="deco corner ' + pos + '" viewBox="0 0 50 50" fill="#e589a8">' +
      '<path d="M25 10 q4 6 0 12 q-4-6 0-12"/><path d="M39 20 q-6 4-12 0 q6-4 12 0"/>' +
      '<path d="M34 37 q-6-4-4-11 q5 4 4 11"/><path d="M16 37 q1-7 4-11 q2 7-4 11"/>' +
      '<path d="M11 20 q6-4 12 0 q-6 4-12 0"/><circle cx="25" cy="25" r="3" fill="#e8730c"/></svg>';
  }
  return '<svg class="deco corner ' + pos + '" viewBox="0 0 40 40" fill="none" stroke="#b98a3a" stroke-width="2.5" stroke-linecap="round">' +
    '<path d="M4 20 Q4 4 20 4"/><path d="M10 22 Q10 10 22 10"/><circle cx="6" cy="6" r="2" fill="#e8730c" stroke="none"/></svg>';
}

/** 装飾テーマに応じたオーバーレイ HTML（コンテンツの外側・.pop 直下に置く） */
function decoHtml_(deco, adjust) {
  var pos = (adjust || {}).stamp;
  var stamp = function (label, cls) {
    if (pos === 'off') return '';
    return '<div class="stamp' + (pos === 'tl' ? ' tl' : '') + (cls ? ' ' + cls : '') + '">' + label + '</div>';
  };
  if (deco === 'lively') {
    return '<div class="deco tape l"></div><div class="deco tape r"></div>' + stamp('おす<br>すめ');
  }
  if (deco === 'season') {
    return cornerSvg_('tl', 'sakura') + cornerSvg_('br', 'sakura') + stamp('旬', 'sk');
  }
  if (deco === 'wamodern') {
    return '<div class="inner-frame"></div>';
  }
  // plain（素朴）: 点線枠 + 四隅の飾り
  return '<div class="inner-frame"></div>' +
    cornerSvg_('tl') + cornerSvg_('tr') + cornerSvg_('bl') + cornerSvg_('br');
}

/* ===== 生産者の声（共通） ===== */
/** 先頭/末尾の「」を外す（テンプレート側で必ず付けるため二重を防ぐ） */
function stripQuotes_(s) {
  return String(s || '').replace(/^\s*「/, '').replace(/」\s*$/, '').trim();
}

/** 生産者の似顔絵。データURI画像のみ許可（外部URLやスクリプトを弾く） */
function portraitImg_(f, cls) {
  var src = String(f.生産者イラスト || '');
  if (src.indexOf('data:image/') !== 0) return '';
  return '<span class="pface' + (cls ? ' ' + cls : '') + '"><img src="' + escapeHtml(src) + '" alt=""></span>';
}

/**
 * 説明型用: 手描き吹き出し（生産者のひとこと）＋似顔絵。
 * ひとこと無しでも似顔絵があれば名札付きで出す。両方無ければ空
 */
function quoteHtml_(f) {
  var q = stripQuotes_(f.生産者のひとこと);
  var face = portraitImg_(f, 'big');
  var who = f.生産者 ? escapeHtml(f.生産者) : '生産者';
  if (!q) {
    if (!face) return '';
    return '<div class="quote-row noq">' + face + '<span class="pname">' + who + '</span></div>';
  }
  var quote = '<div class="quote"><div class="qtext">「' + escapeHtml(q) + '」</div>' +
    '<div class="qwho">— ' + who + 'より</div></div>';
  return face ? '<div class="quote-row">' + face + quote + '</div>' : quote;
}

/* ===== 商品型（棚札） ===== */
function shelfPriceHtml_(価格) {
  if (価格 === null || 価格 === undefined || 価格 === '') return '<div class="price"></div>';
  return '<div class="price">' + escapeHtml(価格) +
    '<span class="yen">円</span><span class="tax">（税込）</span></div>';
}

function renderProduct_(c) {
  var f = c.fields;
  var badge = (c.catchAngle && adjustOf_(c).badge !== false)
    ? '<span class="zip">' + escapeHtml(c.catchAngle) + '</span>'
    : '';
  var q = stripQuotes_(f.生産者のひとこと);
  var footL = [
    portraitImg_(f),
    f.生産者 ? '<span class="ptag">' + escapeHtml(f.生産者) + '</span>' : '',
    q ? '<span class="pquote' + (q.length >= 15 ? ' long' : '') + '">「' + escapeHtml(q) + '」</span>' : '',
  ].filter(Boolean).join('');
  return [
    '<div class="pop shelf ' + escapeHtml(c.variant) + ' ' + themeClass_(c) + accentClass_(c) +
      portraitAdjustClass_(c) + frameClass_(c) + shelfDecoClass_(c) + '"' + fsStyle_(c) + '>',
    shelfDecoHtml_(c),
    // 手動改行があるキャッチは行数制限を緩めて（3行）文字が消えないようにする
    '  <div class="catch' + (/\n/.test(String(c.catch || '')) ? ' manual' : '') + '">' + badge + nl2brHtml_(c.catch) + '</div>',
    '  <div class="name-wrap"><div class="name' + (String(f.商品名 || '').length >= 8 ? ' long' : '') + '">' + escapeHtml(f.商品名) + '</div>',
    f.補足 ? '    <div class="reading">' + escapeHtml(f.補足) + '</div>' : '',
    '  </div>',
    '  ' + shelfPriceHtml_(f.価格),
    '  <div class="foot"><div class="foot-l">' + footL + '</div><span class="amount"><b>' + escapeHtml(f.容量) + '</b></span></div>',
    '</div>',
  ].filter(Boolean).join('\n');
}

/* ===== 説明型の部品 ===== */
function validCompare_(list) {
  return (list || []).filter(function (d) {
    return isFinite(d.対象値) && isFinite(d.比較値) && d.比較値 > 0;
  }).slice(0, 2);
}

function chartsHtml_(list) {
  var items = validCompare_(list);
  if (items.length === 0) return '';
  var cls = ['', 'fe'];
  var html = items.map(function (d, i) {
    var ratio = d.対象値 / d.比較値;
    var hi = 100;
    var lo = Math.max(12, Math.min(96, Math.round(96 / ratio)));  // ratio>0 保証済み
    return [
      '<div class="chart ' + cls[i % 2] + '">',
      '  <div class="metric">' + escapeHtml(d.ラベル) + '</div>',
      '  <div class="mult">' + escapeHtml(ratio) + escapeHtml(d.単位 || '倍') + '！</div>',
      '  <div class="bars"><div class="bar hi" style="height:' + hi + '%"></div><div class="bar lo" style="height:' + lo + '%"></div></div>',
      '  <div class="lg"><span>' + escapeHtml(d.対象名 || '本品') + '</span><span>' + escapeHtml(d.比較名 || '一般品') + '</span></div>',
      d.補足 ? '  <div class="cap">' + escapeHtml(d.補足) + '</div>' : '',
      '</div>',
    ].filter(Boolean).join('\n');
  }).join('\n');
  return '<div class="charts">' + html + '</div>';
}

function numberCardsHtml_(list) {
  var items = validCompare_(list);
  if (items.length === 0) return '';
  var cls = ['g', 'p'];
  var cards = items.map(function (d, i) {
    var ratio = d.対象値 / d.比較値;
    return '<div class="numcard ' + cls[i % 2] + '">' +
      '<div class="label">' + escapeHtml(d.ラベル) + '</div>' +
      '<div class="big">' + escapeHtml(ratio) + escapeHtml(d.単位 || '倍') + '！</div>' +
      (d.補足 ? '<div class="vs">' + escapeHtml(d.補足) + '</div>' : '') +
      '</div>';
  }).join('');
  return '<div class="numbers">' + cards + '</div>';
}

function pointBoxesHtml_(bullets) {
  var items = (bullets || []).slice(0, 4);
  if (items.length === 0) return '';
  return '<div class="pointlist">' + items.map(function (s) {
    return '<div class="pointbox">' + escapeHtml(s) + '</div>';
  }).join('') + '</div>';
}

function listHtml_(bullets) {
  var items = (bullets || []).slice(0, 6);
  if (items.length === 0) return '';
  return '<ul class="list">' + items.map(function (s) {
    return '<li><span class="mark">✔</span><span>' + escapeHtml(s) + '</span></li>';
  }).join('') + '</ul>';
}

/**
 * 説明型は変種ごとに別レイアウト。
 * e1 問いかけ型 / e2 数字インパクト型 / e3 やさしい解説型。
 * 比較データが無い場合も箇条書き・説明文で見栄えするようフォールバック。
 */
function renderExplain_(c) {
  var f = c.fields;
  var v = (c.variant === 'e2' || c.variant === 'e3') ? c.variant : 'e1';
  var deco = decoName_(c);
  var header = [];  // 上部（見出し）
  var mid = [];     // 中央（残り高さいっぱいに広げる）
  var foot = '';    // 下部（締め）

  var quote = quoteHtml_(f);  // 生産者のひとこと吹き出し（あれば各レイアウトの下部に）

  if (v === 'e2') {
    // 数字インパクト型。ひとことがあれば機械的な定型文の代わりに「声」で締める
    header.push('<div class="theme">' + nl2brHtml_(c.catch) + '</div>');
    mid.push(numberCardsHtml_(f.比較データ) || pointBoxesHtml_(f.箇条書き));
    if (f.説明文) mid.push('<div class="body-text">' + escapeHtml(f.説明文) + '</div>');
    foot = quote || '<div class="foot">' + escapeHtml(f.主題) + '、いかがですか？</div>';
  } else if (v === 'e3') {
    // やさしい解説型
    if (f.フック) header.push('<div class="hook">' + escapeHtml(f.フック) + '</div>');
    header.push('<div class="theme">' + escapeHtml(f.主題) + '</div>');
    mid.push(listHtml_(f.箇条書き) ||
      (f.説明文 ? '<div class="body-text">' + escapeHtml(f.説明文) + '</div>' : ''));
    foot = quote + '<div class="foot">' + nl2brHtml_(c.catch) + '</div>';
  } else {
    // e1 問いかけ型
    header.push('<div class="q1">' + escapeHtml(f.主題) + '</div>');
    header.push('<div class="q2">' + emphasizeQ_(c.catch) + '</div>');
    mid.push(chartsHtml_(f.比較データ) || listHtml_(f.箇条書き) ||
      (f.説明文 ? '<div class="body-text">' + escapeHtml(f.説明文) + '</div>' : ''));
    foot = quote + '<div class="foot">' + escapeHtml(f.フック || f.説明文 || '') + '</div>';
  }

  return [
    '<div class="pop a4 ' + escapeHtml(c.variant) + ' ' + themeClass_(c) + ' deco-' + deco + accentClass_(c) +
      stampClass_(c) + portraitAdjustClass_(c) + frameClass_(c) + '"' + fsStyle_(c) + '>',
    decoHtml_(deco, adjustOf_(c)),
    '<div class="a4-body">',
    header.filter(Boolean).join('\n'),
    '<div class="a4-mid">' + mid.filter(Boolean).join('\n') + '</div>',
    foot,
    '</div>',
    '</div>',
  ].join('\n');
}

function renderPop(content) {
  if (content.type === 'product') return renderProduct_(content);
  if (content.type === 'explain') return renderExplain_(content);
  throw new Error('不明な POP 種別: ' + content.type);
}

if (typeof module !== 'undefined') {
  module.exports = { renderPop, escapeHtml };
}
</script>
