<!DOCTYPE html>
<html lang="ja">
<head>
<base target="_top">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&family=Zen+Kurenaido&family=Yomogi&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<?!= include('appCss'); ?>
<?!= include('popStyles'); ?>
</head>
<body>
<header class="app-top">
  <span class="brand">🌱 ふれあい広場 POPメーカー</span>
</header>

<div id="loading" class="loading" hidden><div class="spinner"></div><p id="loading-msg"></p></div>
<div id="error-bar" class="error-bar" hidden>
  <span id="error-msg"></span>
  <button id="error-retry" class="btn mini">もう一度</button>
  <button id="error-close" class="btn mini ghost">閉じる</button>
</div>

<main>
  <section data-screen="home">
    <div class="center"><button class="btn big" id="btn-new">＋ 新しいPOPをつくる</button></div>
    <h2 class="sec">これまでのPOP</h2>
    <div id="history-grid" class="history-grid"><p class="muted">読み込み中…</p></div>
  </section>
  <section data-screen="input" hidden>
    <div class="steps"><span class="stepchip on">1 入力</span><span class="stepchip">2 確認</span><span class="stepchip">3 案をえらぶ</span><span class="stepchip">4 印刷</span></div>
    <div class="field"><label>つくるPOPの種類</label>
      <div class="choice-row">
        <div class="choice on" id="choice-product"><span class="ic">🏷</span>商品型（棚札）<span class="sub2">横長・値段が主役</span></div>
        <div class="choice" id="choice-explain"><span class="ic">📄</span>説明型（A4）<span class="sub2">縦長・くわしい説明</span></div>
      </div>
    </div>
    <div class="field"><label>インタビューの入れ方(どちらでもOK)</label>
      <div class="choice-row">
        <div class="dropzone" id="audio-drop">🎤 音声ファイルを選択<br>
          <span style="font-size:.7rem">スマホの録音アプリのファイルでOK(15MBまで)</span>
          <input type="file" id="audio-file" accept=".m4a,.mp3,.wav,.aac,.ogg,.flac" hidden>
          <div id="audio-name" class="muted"></div>
        </div>
        <textarea id="input-text" class="input area" placeholder="またはインタビュー内容をここに貼り付け・入力"></textarea>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn ghost" id="input-back">← ホーム</button>
      <button class="btn big" id="btn-process">AIで内容を整理する →</button>
    </div>
  </section>
  <section data-screen="confirm" hidden>
    <div class="steps"><span class="stepchip">1 入力</span><span class="stepchip on">2 確認</span><span class="stepchip">3 案をえらぶ</span><span class="stepchip">4 印刷</span></div>
    <div class="ai-note">🤖 AIがインタビューから内容を抜き出しました。<b>まちがいがないか確認して、直せます。</b><span id="missing-note"></span></div>
    <div id="confirm-form"></div>
    <div class="btn-row">
      <button class="btn ghost" id="confirm-back">← もどる</button>
      <button class="btn big" id="btn-catches">この内容で3案つくる →</button>
    </div>
  </section>
  <section data-screen="variants" hidden><!-- Task 11 --></section>
  <section data-screen="print" hidden><!-- Task 12 --></section>
</main>

<div id="print-area"></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<?!= include('popTemplatesJs'); ?>
<?!= include('appJs'); ?>
</body>
</html>
